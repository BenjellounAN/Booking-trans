<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>All Operations · Transfer History</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 20px;
    margin: 0;
    min-height: 100vh;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 20px 30px;
    border-radius: 60px;
    border: 1px solid rgba(255,255,255,0.2);
}

.header h1 {
    color: white;
    font-size: 2rem;
    font-weight: 700;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    gap: 15px;
}

.header h1 svg {
    width: 40px;
    height: 40px;
    fill: white;
}

.back-btn {
    background: rgba(255,255,255,0.2);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 12px 24px;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
    font-size: 1rem;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s ease;
    text-decoration: none;
}

.back-btn:hover {
    background: rgba(255,255,255,0.3);
    transform: translateY(-2px);
}

.back-btn svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
}

/* Stats Cards */
.stats-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 30px;
    padding: 20px;
    color: white;
    transition: transform 0.3s;
}

.stat-card:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.15);
}

.stat-label {
    font-size: 0.9rem;
    opacity: 0.8;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.stat-value {
    font-size: 2rem;
    font-weight: 700;
}

.stat-unit {
    font-size: 1rem;
    opacity: 0.7;
    margin-left: 5px;
}

/* Filters */
.filters-section {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 30px;
    padding: 20px;
    margin-bottom: 30px;
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    align-items: center;
}

.filter-label {
    color: white;
    font-weight: 500;
    margin-right: 10px;
}

.filter-select {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 30px;
    padding: 10px 20px;
    color: white;
    font-size: 0.95rem;
    cursor: pointer;
    outline: none;
    min-width: 150px;
}

.filter-select option {
    background: #764ba2;
    color: white;
}

.search-box {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 30px;
    padding: 10px 20px;
    color: white;
    font-size: 0.95rem;
    flex: 1;
    min-width: 250px;
}

.search-box::placeholder {
    color: rgba(255,255,255,0.7);
}

.clear-filters {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 30px;
    padding: 10px 20px;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
}

.clear-filters:hover {
    background: rgba(255,255,255,0.3);
}

/* Operations Table */
.table-container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 30px;
    overflow: hidden;
    margin-bottom: 30px;
}

.operations-table {
    width: 100%;
    border-collapse: collapse;
    color: white;
}

.operations-table th {
    background: rgba(0,0,0,0.2);
    padding: 20px 15px;
    font-weight: 600;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
    border-bottom: 2px solid rgba(255,255,255,0.1);
}

.operations-table td {
    padding: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    text-align: center;
}

.operations-table tr:hover {
    background: rgba(255,255,255,0.1);
}

/* Person Badges */
.ops-person-badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 12px;
    min-width: 90px;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
}

/* Type Badge */
.type-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
}

.type-payment {
    background: rgba(33, 150, 243, 0.3);
    color: #bbdefb;
    border: 1px solid #2196f3;
}

.type-transfer {
    background: rgba(156, 39, 176, 0.3);
    color: #e1bee7;
    border: 1px solid #9c27b0;
}

/* Amount */
.amount-positive {
    color: #a5d6a7;
    font-weight: 700;
}

/* No Data */
.no-data-ops {
    text-align: center;
    padding: 60px;
    color: white;
}

.no-data-icon {
    font-size: 4rem;
    margin-bottom: 20px;
    opacity: 0.7;
}

/* Pagination */
.pagination {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 30px;
}

.page-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
}

.page-btn:hover {
    background: rgba(255,255,255,0.3);
}

.page-btn.active {
    background: white;
    color: #764ba2;
    font-weight: 700;
}

/* Delete button */
.ops-delete-btn {
    background: rgba(255,82,82,0.3);
    border: 1px solid #ff5252;
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
}

.ops-delete-btn:hover {
    background: #ff5252;
    transform: scale(1.1);
}

/* Loading */
.loading {
    text-align: center;
    padding: 60px;
    color: white;
}

.loading-spinner {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Responsive */
@media (max-width: 768px) {
    .header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
    }
    
    .filters-section {
        flex-direction: column;
    }
    
    .filter-select, .search-box {
        width: 100%;
    }
    
    .operations-table {
        font-size: 13px;
    }
    
    .operations-table th, 
    .operations-table td {
        padding: 10px 5px;
    }
    
    .ops-person-badge {
        min-width: 70px;
        padding: 4px 8px;
        font-size: 11px;
    }
}
</style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <h1>
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
            </svg>
            All Operations History
        </h1>
        <button class="back-btn" onclick="window.location.href='admin.html'">
            <svg viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            Back to Admin
        </button>
    </div>

    <!-- Stats Cards -->
    <div class="stats-container" id="statsContainer">
        <div class="stat-card">
            <div class="stat-label">📊 Total Operations</div>
            <div class="stat-value" id="totalOps">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">💰 Total Amount</div>
            <div class="stat-value" id="totalAmount">0.00 <span class="stat-unit">MAD</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">💳 Payments</div>
            <div class="stat-value" id="totalPayments">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">📦 Transfers</div>
            <div class="stat-value" id="totalTransfers">0</div>
        </div>
    </div>

    <!-- Filters -->
    <div class="filters-section">
        <span class="filter-label">Filter by:</span>
        <select class="filter-select" id="typeFilter">
            <option value="all">All Types</option>
            <option value="payment">Payments</option>
            <option value="transfer">Transfers</option>
        </select>
        
        <select class="filter-select" id="personFilter">
            <option value="all">All Persons</option>
            <option value="anas">Anas</option>
            <option value="oussama">Oussama</option>
            <option value="amine">Amine</option>
            <option value="houssam">Houssam</option>
            <option value="zaki">Zaki</option>
            <option value="mohamed">Mohamed</option>
        </select>
        
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search in description...">
        
        <button class="clear-filters" id="clearFilters">Clear Filters</button>
    </div>

    <!-- Operations Table -->
    <div class="table-container">
        <table class="operations-table" id="operationsTable">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Person(s)</th>
                    <th>Amount</th>
                    <th>Description</th>
                    <th>Date & Time</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="6">
                        <div class="loading">
                            <div class="loading-spinner"></div>
                            Loading operations...
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// Check authentication
if (sessionStorage.getItem('isAuthenticated') !== 'true') {
    window.location.href = 'login.html';
}

const firebaseConfig = {
    apiKey: "AIzaSyCh8ssk6K7_LXDPpG3X85Z7VlUwDa_0_Og",
    authDomain: "deliverymarrakech.firebaseapp.com",
    projectId: "deliverymarrakech",
    storageBucket: "deliverymarrakech.firebasestorage.app",
    messagingSenderId: "543072772322",
    appId: "1:543072772322:web:468d0c047e06c86bde7ebb",
    measurementId: "G-YMXBJFJ9N8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Global variables
let allOperations = [];
let filteredOperations = [];
let currentPage = 1;
const itemsPerPage = 15;

// DOM elements
const tableBody = document.getElementById('tableBody');
const typeFilter = document.getElementById('typeFilter');
const personFilter = document.getElementById('personFilter');
const searchInput = document.getElementById('searchInput');
const clearFiltersBtn = document.getElementById('clearFilters');
const totalOpsSpan = document.getElementById('totalOps');
const totalAmountSpan = document.getElementById('totalAmount');
const totalPaymentsSpan = document.getElementById('totalPayments');
const totalTransfersSpan = document.getElementById('totalTransfers');
const paginationDiv = document.getElementById('pagination');

// Format date function
function formatDate(timestamp) {
    if (!timestamp) return 'No date';
    
    let date;
    if (timestamp.toDate) {
        date = timestamp.toDate();
    } else {
        date = new Date(timestamp);
    }
    
    return date.toLocaleString('en-US', { 
        year: 'numeric',
        month: '2-digit', 
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
    });
}

// Load all operations
async function loadAllOperations() {
    try {
        // Load payments
        const paymentsSnapshot = await db.collection("payments")
            .orderBy("time", "desc")
            .get();
        
        // Load transfers
        const transfersSnapshot = await db.collection("wallet_entries")
            .orderBy("timestamp", "desc")
            .get();
        
        allOperations = [];
        
        // Process payments
        paymentsSnapshot.forEach(doc => {
            const data = doc.data();
            const price = parseFloat(data.price) || 0;
            const half = price / 2;
            
            allOperations.push({
                id: doc.id,
                type: 'payment',
                collection: 'payments',
                person1: data.name1,
                person2: data.name2,
                amount: price,
                half1: half,
                half2: half,
                description: data.description || '-',
                timestamp: data.time,
                date: formatDate(data.time),
                rawData: data
            });
        });
        
        // Process transfers
        transfersSnapshot.forEach(doc => {
            const data = doc.data();
            allOperations.push({
                id: doc.id,
                type: 'transfer',
                collection: 'wallet_entries',
                member: data.member,
                amount: data.amount || 0,
                description: `Wallet transfer to ${data.member}`,
                timestamp: data.timestamp,
                date: formatDate(data.timestamp),
                rawData: data
            });
        });
        
        // Sort by timestamp (newest first)
        allOperations.sort((a, b) => {
            const timeA = a.timestamp?.seconds || 0;
            const timeB = b.timestamp?.seconds || 0;
            return timeB - timeA;
        });
        
        // Apply filters
        applyFilters();
        
    } catch (error) {
        console.error("Error loading operations:", error);
        tableBody.innerHTML = `
            <tr>
                <td colspan="6">
                    <div class="no-data-ops">
                        <div class="no-data-icon">❌</div>
                        Error loading operations<br>
                        <small>${error.message}</small>
                    </div>
                </td>
            </tr>
        `;
    }
}

// Apply filters
function applyFilters() {
    const type = typeFilter.value;
    const person = personFilter.value.toLowerCase();
    const search = searchInput.value.toLowerCase();
    
    filteredOperations = allOperations.filter(op => {
        // Type filter
        if (type !== 'all' && op.type !== type) return false;
        
        // Person filter
        if (person !== 'all') {
            if (op.type === 'payment') {
                const person1 = op.person1?.toLowerCase() || '';
                const person2 = op.person2?.toLowerCase() || '';
                if (person1 !== person && person2 !== person) return false;
            } else {
                if (op.member?.toLowerCase() !== person) return false;
            }
        }
        
        // Search filter
        if (search) {
            const description = op.description?.toLowerCase() || '';
            if (!description.includes(search)) return false;
        }
        
        return true;
    });
    
    // Update stats
    updateStats();
    
    // Reset to first page
    currentPage = 1;
    
    // Render table
    renderTable();
}

// Update statistics
function updateStats() {
    const totalOps = filteredOperations.length;
    const totalAmount = filteredOperations.reduce((sum, op) => sum + (op.amount || 0), 0);
    const totalPayments = filteredOperations.filter(op => op.type === 'payment').length;
    const totalTransfers = filteredOperations.filter(op => op.type === 'transfer').length;
    
    totalOpsSpan.textContent = totalOps;
    totalAmountSpan.textContent = totalAmount.toFixed(2);
    totalPaymentsSpan.textContent = totalPayments;
    totalTransfersSpan.textContent = totalTransfers;
}

// Render table with pagination
function renderTable() {
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pageItems = filteredOperations.slice(start, end);
    
    if (filteredOperations.length === 0) {
        tableBody.innerHTML = `
            <tr>
                <td colspan="6">
                    <div class="no-data-ops">
                        <div class="no-data-icon">📭</div>
                        No operations found<br>
                        <small>Try adjusting your filters</small>
                    </div>
                </td>
            </tr>
        `;
        paginationDiv.innerHTML = '';
        return;
    }
    
    let html = '';
    
    pageItems.forEach(op => {
        if (op.type === 'payment') {
            // Payment row
            html += `
                <tr>
                    <td><span class="type-badge type-payment">Payment</span></td>
                    <td>
                        <span class="ops-person-badge">${op.person1 || 'N/A'}</span>
                        <span style="margin:0 5px;">→</span>
                        <span class="ops-person-badge">${op.person2 || 'N/A'}</span>
                    </td>
                    <td class="amount-positive">${op.amount.toFixed(2)} MAD</td>
                    <td>${op.description}</td>
                    <td>${op.date}</td>
                    <td>
                        <button class="ops-delete-btn" onclick="deleteOperation('${op.id}', '${op.collection}')" title="Delete">🗑️</button>
                    </td>
                </tr>
            `;
        } else {
            // Transfer row
            html += `
                <tr>
                    <td><span class="type-badge type-transfer">Transfer</span></td>
                    <td>
                        <span class="ops-person-badge">${op.member || 'N/A'}</span>
                    </td>
                    <td class="amount-positive">${op.amount.toFixed(2)} MAD</td>
                    <td>${op.description}</td>
                    <td>${op.date}</td>
                    <td>
                        <button class="ops-delete-btn" onclick="deleteOperation('${op.id}', '${op.collection}')" title="Delete">🗑️</button>
                    </td>
                </tr>
            `;
        }
    });
    
    tableBody.innerHTML = html;
    
    // Render pagination
    renderPagination();
}

// Render pagination
function renderPagination() {
    const totalPages = Math.ceil(filteredOperations.length / itemsPerPage);
    if (totalPages <= 1) {
        paginationDiv.innerHTML = '';
        return;
    }
    
    let pages = '';
    for (let i = 1; i <= totalPages; i++) {
        pages += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
    }
    
    paginationDiv.innerHTML = pages;
}

// Go to page
function goToPage(page) {
    currentPage = page;
    renderTable();
}

// Delete operation
async function deleteOperation(id, collection) {
    if (!confirm('Are you sure you want to delete this operation?')) return;
    
    try {
        await db.collection(collection).doc(id).delete();
        console.log('Operation deleted');
        // Reload all operations
        await loadAllOperations();
    } catch (error) {
        console.error("Error deleting operation:", error);
        alert("Failed to delete operation");
    }
}

// Event listeners
typeFilter.addEventListener('change', applyFilters);
personFilter.addEventListener('change', applyFilters);
searchInput.addEventListener('input', applyFilters);
clearFiltersBtn.addEventListener('click', () => {
    typeFilter.value = 'all';
    personFilter.value = 'all';
    searchInput.value = '';
    applyFilters();
});

// Initial load
loadAllOperations();

// Make functions global
window.deleteOperation = deleteOperation;
window.goToPage = goToPage;
</script>

</body>
</html>
