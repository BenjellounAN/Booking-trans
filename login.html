<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Private System</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.login-box {
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    width: 300px;
}
.login-box h2 {
    margin-bottom: 30px;
    color: #333;
}
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
    box-sizing: border-box;
}
button {
    width: 100%;
    padding: 12px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}
button:hover {
    background: #45a049;
}
.error {
    color: red;
    margin-top: 10px;
    display: none;
}
.note {
    margin-top: 20px;
    color: #666;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>🔐 User Login</h2>
    <input type="text" id="username" placeholder="Username" autocomplete="off">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="error" id="errorMsg">Wrong username or password</div>
    <div class="note">Use: any username / 12341234</div>
</div>

<script>
function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    
    if (password === "12341234") {
        sessionStorage.setItem("currentUser", username || "user");
        window.location.href = "index.html";
    } else {
        document.getElementById("errorMsg").style.display = "block";
    }
}

document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        login();
    }
});
</script>

</body>
</html>
