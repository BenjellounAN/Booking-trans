<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Orders</title>

<style>

body{
font-family:Arial;
padding:20px;
}

/* زر admin */

#adminBtn{
position:absolute;
top:20px;
right:20px;
background:black;
color:white;
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

/* الازرار */

button{
padding:12px 25px;
margin:10px;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

/* اخفاء الخطوات */

#step2{
display:none;
}

#step3{
display:none;
}

input,textarea{
width:300px;
padding:10px;
margin-top:5px;
margin-bottom:15px;
display:block;
}

</style>
</head>

<body>

<button id="adminBtn">Admin</button>

<h2>Choose name</h2>

<div id="step1">

<button id="anas" style="background:red;">Anas</button>

<button id="oussama" style="background:blue;">Oussama</button>

<button id="amine" style="background:yellow;color:black;">Amine</button>

</div>


<div id="step2">

<h2>Choose second name</h2>

<button id="houssam" style="background:brown;">Houssam</button>

<button id="zaki" style="background:green;">Zaki</button>

<br>

<button id="backToFirst" style="background:gray;">Back</button>

</div>


<div id="step3">

<h2>Information</h2>

<label>Price MAD</label>
<input type="number" id="price">

<label>Description</label>
<textarea id="desc"></textarea>

<button id="send" style="background:green;">Send</button>

<button id="back" style="background:gray;">Back</button>

</div>


<script>

let mainName=""
let secondName=""

/* زر الادمن */

document.getElementById("adminBtn").onclick=function(){

window.location.href="admin.html"

}

/* step1 */

document.getElementById("anas").onclick=function(){
mainName="Anas"
goStep2()
}

document.getElementById("oussama").onclick=function(){
mainName="Oussama"
goStep2()
}

document.getElementById("amine").onclick=function(){
mainName="Amine"
goStep2()
}

/* step2 */

document.getElementById("houssam").onclick=function(){
secondName="Houssam"
goStep3()
}

document.getElementById("zaki").onclick=function(){
secondName="Zaki"
goStep3()
}

/* رجوع للخطوة الاولى */

document.getElementById("backToFirst").onclick=function(){

document.getElementById("step2").style.display="none"
document.getElementById("step1").style.display="block"

}

/* رجوع للخطوة الثانية */

document.getElementById("back").onclick=function(){

document.getElementById("step3").style.display="none"
document.getElementById("step2").style.display="block"

}

/* send */

document.getElementById("send").onclick=function(){

let price=document.getElementById("price").value
let desc=document.getElementById("desc").value

console.log(mainName,secondName,price,desc)

alert("Data Ready")

}

/* functions */

function goStep2(){

document.getElementById("step1").style.display="none"
document.getElementById("step2").style.display="block"

}

function goStep3(){

document.getElementById("step2").style.display="none"
document.getElementById("step3").style.display="block"

}

</script>

</body>
</html>
