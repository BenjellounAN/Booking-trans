<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders Page</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
  }
  button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    color: white;
    cursor: pointer;
    font-size: 16px;
    border-radius: 5px;
  }
  #step2, #step3 {
    margin-top: 20px;
  }
  input, textarea {
    width: 300px;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 15px;
    display: block;
  }
</style>
</head>
<body>

<h2>Step 1: Choose a main person</h2>
<div id="step1">
  <button style="background-color:red;" data-name="Anas">Anas</button>
  <button style="background-color:blue;" data-name="Oussama">Oussama</button>
  <button style="background-color:yellow;color:black;" data-name="Amine">Amine</button>
</div>

<div id="step2" style="display:none;">
  <h2>Step 2: Choose a secondary person</h2>
  <button style="background-color:brown;" data-name="Houssam">Houssam</button>
  <button style="background-color:green;" data-name="Zaki">Zaki</button>
</div>

<div id="step3" style="display:none;">
  <h2>Step 3: Enter details</h2>
  <label>Price (MAD)</label>
  <input type="number" id="price" placeholder="Enter price" />
  <label>Description</label>
  <textarea id="description" placeholder="Enter description"></textarea>
  <button id="sendBtn" style="background-color:green;">Send</button>
  <button id="backBtn" style="background-color:gray;">Back</button>
</div>

<script type="module">
  // Firebase setup
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.2/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.6.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCh8ssk6K7_LXDPpG3X85Z7VlUwDa_0_Og",
    authDomain: "deliverymarrakech.firebaseapp.com",
    projectId: "deliverymarrakech",
    storageBucket: "deliverymarrakech.firebasestorage.app",
    messagingSenderId: "543072772322",
    appId: "1:543072772322:web:468d0c047e06c86bde7ebb",
    measurementId: "G-YMXBJFJ9N8"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Steps handling
  let mainPerson = "";
  let secondaryPerson = "";

  const step1Buttons = document.querySelectorAll("#step1 button");
  const step2Buttons = document.querySelectorAll("#step2 button");
  const step1Div = document.getElementById("step1");
  const step2Div = document.getElementById("step2");
  const step3Div = document.getElementById("step3");
  const sendBtn = document.getElementById("sendBtn");
  const backBtn = document.getElementById("backBtn");

  step1Buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      mainPerson = btn.dataset.name;
      step1Div.style.display = "none";
      step2Div.style.display = "block";
    });
  });

  step2Buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      secondaryPerson = btn.dataset.name;
      step2Div.style.display = "none";
      step3Div.style.display = "block";
    });
  });

  backBtn.addEventListener("click", () => {
    step3Div.style.display = "none";
    step2Div.style.display = "block";
  });

  sendBtn.addEventListener("click", async () => {
    const price = document.getElementById("price").value;
    const description = document.getElementById("description").value;

    if (!price) {
      alert("Please enter a price!");
      return;
    }

    try {
      await addDoc(collection(db, "orders"), {
        mainPerson,
        secondaryPerson,
        price: Number(price),
        description
      });
      alert("Order sent successfully!");
      // Reset all steps
      step3Div.style.display = "none";
      step1Div.style.display = "block";
      document.getElementById("price").value = "";
      document.getElementById("description").value = "";
    } catch (error) {
      console.error("Error adding document: ", error);
      alert("Failed to send order.");
    }
  });
</script>

</body>
</html>
