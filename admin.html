<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Admin Panel · Wallet System</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body{
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
background: #f0f2f5;
padding: 12px;
margin:0;
min-height: 100vh;
}

h1{
text-align:center;
color:#1a1a1a;
margin: 15px 0 20px;
font-size: 1.8em;
}

/* Header Actions */
.header-actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 25px;
    gap: 15px;
    background: white;
    padding: 20px 25px;
    border-radius: 60px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    border: 1px solid #e9ecf0;
}

.top-row {
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: center;
    width: 100%;
}

.bottom-row {
    display: flex;
    gap: 15px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    width: 100%;
    padding-top: 10px;
    border-top: 2px dashed #e0e7f0;
}

.action-btn {
    padding: 12px 24px;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
}

.action-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transform: translate(-50%, -50%);
    transition: width 0.5s, height 0.5s;
}

.action-btn:hover::before {
    width: 300px;
    height: 300px;
}

.action-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.action-btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
}

.back-btn {
    background: linear-gradient(135deg, #6c757d, #5a6268);
    color: white;
    min-width: 120px;
}

.refresh-btn {
    background: linear-gradient(135deg, #2196f3, #1976d2);
    color: white;
}

.send-wallet-btn {
    background: linear-gradient(135deg, #9c27b0, #7b1fa2);
    color: white;
    padding: 14px 32px;
    font-size: 1.1rem;
    box-shadow: 0 8px 20px rgba(156,39,176,0.4);
}

.view-wallet-btn {
    background: linear-gradient(135deg, #2d5f7e, #1d4e6b);
    color: white;
    padding: 14px 32px;
    font-size: 1.1rem;
    box-shadow: 0 8px 20px rgba(45,95,126,0.4);
}

.logout-btn {
    background: linear-gradient(135deg, #dc3545, #c82333);
    color: white;
    min-width: 120px;
}

.send-wallet-btn svg, .view-wallet-btn svg {
    width: 22px;
    height: 22px;
}

/* Summary Section - Current Totals */
.summary{
display: grid;
grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
gap: 15px;
margin: 25px 0 20px;
}

.box{
background: white;
padding: 15px 10px;
border-radius: 20px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
font-weight: 500;
font-size: 0.95em;
text-align: center;
border: 1px solid #eef2f6;
transition: all 0.3s;
}

.box:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

.box span{
display: block;
font-size: 1.5em;
font-weight: 700;
margin-top: 8px;
color: #1e2b3a;
}

.box[data-person="anas"] { border-bottom: 4px solid #c62828; background: linear-gradient(to bottom, #ffffff, #ffebee); }
.box[data-person="oussama"] { border-bottom: 4px solid #1565c0; background: linear-gradient(to bottom, #ffffff, #e3f2fd); }
.box[data-person="amine"] { border-bottom: 4px solid #9e6b0c; background: linear-gradient(to bottom, #ffffff, #fffde7); }
.box[data-person="houssam"] { border-bottom: 4px solid #bf5e00; background: linear-gradient(to bottom, #ffffff, #fff3e0); }
.box[data-person="zaki"] { border-bottom: 4px solid #2e7d32; background: linear-gradient(to bottom, #ffffff, #e8f5e9); }
.box[data-person="mohamed"] { border-bottom: 4px solid #6a1b9a; background: linear-gradient(to bottom, #ffffff, #f3e5f5); }

.box small {
    color: #666;
    font-size: 0.75em;
    display: block;
    margin-top: 5px;
}

/* Table Container */
.table-container{
overflow-x: auto;
border-radius: 24px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
margin-bottom: 25px;
background: white;
border: 1px solid #e9ecf0;
}

table{
width:100%;
border-collapse:collapse;
background:white;
font-size: 14px;
min-width: 700px;
}

th,td{
padding:16px 12px;
border:1px solid #edf2f7;
text-align:center;
}

th{
background:linear-gradient(135deg, #2c3e50, #1e2b3a);
color:white;
font-weight:600;
font-size: 13px;
white-space: nowrap;
letter-spacing: 0.5px;
}

tr:nth-child(even){
background:#f8fafd;
}

tr:hover{
background:#e3f2fd;
}

.person-badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 12px;
    min-width: 90px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.person-anas { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }
.person-ous { background: #e3f2fd; color: #1565c0; border-left: 4px solid #1565c0; }
.person-amine { background: #fffde7; color: #9e6b0c; border-left: 4px solid #9e6b0c; }
.person-houssam { background: #fff3e0; color: #bf5e00; border-left: 4px solid #bf5e00; }
.person-zaki { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
.person-mohamed { background: #f3e5f5; color: #6a1b9a; border-left: 4px solid #6a1b9a; }

.deleteBtn {
    background: #ff5252;
    color: white;
    border: none;
    width: 38px;
    height: 38px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 1.2em;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 4px 10px rgba(255,82,82,0.3);
}

.deleteBtn:hover {
    background: #d32f2f;
    transform: scale(1.1) rotate(5deg);
}

.deleteBtn:active {
    transform: scale(0.9);
}

/* ========== WALLET MODAL - FIXED HORIZONTAL DISPLAY ========== */
.wallet-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    z-index: 10000;
    overflow-y: auto;
    padding: 20px;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.98); }
    to { opacity: 1; transform: scale(1); }
}

.modal-content {
    max-width: 1300px;
    margin: 20px auto;
    position: relative;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 40px;
    padding: 30px;
    border: 1px solid rgba(255,255,255,0.2);
}

.close-modal-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    background: linear-gradient(135deg, #f44336, #d32f2f);
    color: white;
    border: none;
    width: 45px;
    height: 45px;
    border-radius: 25px;
    font-size: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 25px rgba(244,67,54,0.4);
    transition: all 0.3s;
    z-index: 10001;
}

.close-modal-btn:hover {
    transform: rotate(90deg) scale(1.1);
}

.modal-header {
    margin-bottom: 30px;
    padding-right: 60px;
}

.modal-header h2 {
    font-size: 2rem;
    color: white;
    font-weight: 700;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    display: inline-block;
    border-bottom: 3px solid rgba(255,255,255,0.3);
    padding-bottom: 10px;
}

/* HORIZONTAL CARDS CONTAINER */
.horizontal-cards-container {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    margin: 20px 0;
}

/* SMALL HORIZONTAL CARD - كل بطاقة أفقية صغيرة */
.small-wallet-card {
    background: white;
    border-radius: 20px;
    padding: 15px 18px;
    min-width: 160px;
    max-width: 180px;
    flex: 1 1 auto;
    box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    transition: all 0.3s;
    border: 1px solid rgba(255,255,255,0.3);
}

.small-wallet-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

/* Card Header - اسم العضو */
.card-header {
    font-size: 1.2rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 30px;
    display: inline-block;
    color: white;
    margin-bottom: 12px;
}

/* Card Amount - المبلغ */
.card-amount {
    font-size: 1.8rem;
    font-weight: 800;
    color: #2d3748;
    line-height: 1.2;
    margin: 5px 0;
}

/* Card Date - التاريخ */
.card-date {
    font-size: 0.8rem;
    color: #718096;
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed #e2e8f0;
}

.card-date svg {
    width: 14px;
    height: 14px;
    fill: #718096;
}

/* Member Colors */
.header-anas { background: linear-gradient(135deg, #c62828, #b71c1c); }
.header-oussama { background: linear-gradient(135deg, #1565c0, #0d47a1); }
.header-amine { background: linear-gradient(135deg, #9e6b0c, #7f5a0a); }
.header-houssam { background: linear-gradient(135deg, #bf5e00, #9e4d00); }
.header-zaki { background: linear-gradient(135deg, #2e7d32, #1b5e20); }
.header-mohamed { background: linear-gradient(135deg, #6a1b9a, #4a0072); }

/* Empty state */
.no-data-modal {
    text-align: center;
    padding: 60px;
    color: white;
    background: rgba(255,255,255,0.1);
    border-radius: 30px;
    font-size: 1.2rem;
}

.no-data-icon {
    font-size: 4rem;
    margin-bottom: 20px;
    display: block;
}

/* No data state for table */
.no-data{
text-align:center;
padding:60px 20px;
background:white;
border-radius:24px;
color:#666;
font-size:1.2em;
border: 1px solid #e9ecf0;
}

.no-data-icon{
font-size:4em;
margin-bottom:20px;
opacity:0.5;
}

/* Responsive */
@media (max-width: 768px) {
    .header-actions {
        border-radius: 30px;
        padding: 15px;
    }
    
    .summary {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }
    
    .small-wallet-card {
        min-width: 140px;
        padding: 12px;
    }
    
    .card-amount {
        font-size: 1.4rem;
    }
}

/* Scrollbar */
::-webkit-scrollbar {
    width: 10px;
}

::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
}

::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
}
</style>
</head>
<body>

<!-- Header Actions -->
<div class="header-actions">
    <div class="top-row">
        <button class="action-btn back-btn" onclick="window.location.href='index.html'">
            <svg viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            <span>Back</span>
        </button>
        
        <button class="action-btn logout-btn" onclick="logout()">
            <span>🚪</span>
            <span>Logout</span>
        </button>
    </div>
    
    <div class="bottom-row">
        <button class="action-btn refresh-btn" onclick="window.location.reload()">
            <span>🔄</span>
            <span>Refresh</span>
        </button>
        
        <button class="action-btn send-wallet-btn" id="sendWalletBtn">
            <svg viewBox="0 0 24 24">
                <path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/>
                <circle cx="18" cy="16" r="2" fill="white" opacity="0.3"/>
            </svg>
            <span>Send Wallet</span>
        </button>
        
        <button class="action-btn view-wallet-btn" id="viewWalletBtn">
            <svg viewBox="0 0 24 24">
                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
                <circle cx="12" cy="12" r="2.5" fill="white" opacity="0.5"/>
            </svg>
            <span>View Wallet</span>
        </button>
    </div>
</div>

<h1>💰 Admin Panel · Wallet Transfer System</h1>

<!-- Current Totals Section -->
<div class="summary" id="summaryContainer">
    <div class="box" data-person="anas">
        Anas <span id="anasTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="oussama">
        Oussama <span id="oussamaTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="amine">
        Amine <span id="amineTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="houssam">
        Houssam <span id="houssamTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="zaki">
        Zaki <span id="zakiTotal">0.00</span> <small>MAD</small>
    </div>
    <div class="box" data-person="mohamed">
        Mohamed <span id="mohamedTotal">0.00</span> <small>MAD</small>
    </div>
</div>

<!-- Table Container -->
<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Main</th>
                <th>Second</th>
                <th>Price (MAD)</th>
                <th>Description</th>
                <th>Time</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<!-- WALLET MODAL - Hidden by default, shows horizontal cards -->
<div class="wallet-modal" id="walletModal">
    <div class="modal-content">
        <button class="close-modal-btn" id="closeModalBtn">&times;</button>
        
        <div class="modal-header">
            <h2>📦 Latest Wallet Transfer</h2>
        </div>
        
        <!-- Horizontal Cards Container -->
        <div class="horizontal-cards-container" id="walletCardsContainer">
            <!-- Cards will be inserted here dynamically -->
        </div>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// Check authentication
if (sessionStorage.getItem('isAuthenticated') !== 'true') {
    window.location.href = 'login.html';
}

function logout() {
    sessionStorage.removeItem('isAuthenticated');
    window.location.href = 'login.html';
}

const firebaseConfig = {
    apiKey: "AIzaSyCh8ssk6K7_LXDPpG3X85Z7VlUwDa_0_Og",
    authDomain: "deliverymarrakech.firebaseapp.com",
    projectId: "deliverymarrakech",
    storageBucket: "deliverymarrakech.firebasestorage.app",
    messagingSenderId: "543072772322",
    appId: "1:543072772322:web:468d0c047e06c86bde7ebb",
    measurementId: "G-YMXBJFJ9N8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const tableBody = document.getElementById("tableBody");

function getPersonClass(person) {
    switch(person?.toLowerCase()) {
        case "anas": return "person-anas"
        case "oussama": return "person-ous"
        case "amine": return "person-amine"
        case "houssam": return "person-houssam"
        case "zaki": return "person-zaki"
        case "mohamed": return "person-mohamed"
        default: return ""
    }
}

// Current totals (updated in real-time)
let currentTotals = { anas: 0, oussama: 0, amine: 0, houssam: 0, zaki: 0, mohamed: 0 };

// Listen to payments and update table + main totals
db.collection("payments")
.orderBy("time", "desc")
.onSnapshot(function(snapshot){
    tableBody.innerHTML = "";
    let totals = { anas: 0, oussama: 0, amine: 0, houssam: 0, zaki: 0, mohamed: 0 };

    if (snapshot.empty) {
        let row = document.createElement("tr");
        row.innerHTML = `<td colspan="6"><div class="no-data"><div class="no-data-icon">📭</div>No payment records found</div></td>`;
        tableBody.appendChild(row);
    } else {
        snapshot.forEach(function(doc){
            let data = doc.data();
            let row = document.createElement("tr");
            let price = parseFloat(data.price) || 0;
            let half = price / 2;
            let mainClass = getPersonClass(data.name1);
            let secondClass = getPersonClass(data.name2);
            
            // Calculate totals based on names
            if(data.name1?.toLowerCase() === "anas") totals.anas += half;
            if(data.name1?.toLowerCase() === "oussama") totals.oussama += half;
            if(data.name1?.toLowerCase() === "amine") totals.amine += half;
            if(data.name2?.toLowerCase() === "houssam") totals.houssam += half;
            if(data.name2?.toLowerCase() === "zaki") totals.zaki += half;
            if(data.name1?.toLowerCase() === "mohamed") totals.mohamed += half;
            if(data.name2?.toLowerCase() === "mohamed") totals.mohamed += half;

            row.innerHTML = `
            <td><span class="person-badge ${mainClass}">${data.name1 || 'N/A'}</span></td>
            <td><span class="person-badge ${secondClass}">${data.name2 || 'N/A'}</span></td>
            <td><strong>${price.toFixed(2)}</strong></td>
            <td>${data.description || '-'}</td>
            <td>${data.time ? new Date(data.time.seconds * 1000).toLocaleString() : 'N/A'}</td>
            <td><button class="deleteBtn" onclick="deleteDoc('${doc.id}')">🗑️</button></td>
            `;
            tableBody.appendChild(row);
        });
    }

    // Update current totals
    currentTotals = { ...totals };
    
    // Update main summary
    document.getElementById("anasTotal").innerText = totals.anas.toFixed(2);
    document.getElementById("oussamaTotal").innerText = totals.oussama.toFixed(2);
    document.getElementById("amineTotal").innerText = totals.amine.toFixed(2);
    document.getElementById("houssamTotal").innerText = totals.houssam.toFixed(2);
    document.getElementById("zakiTotal").innerText = totals.zaki.toFixed(2);
    document.getElementById("mohamedTotal").innerText = totals.mohamed.toFixed(2);
});

function deleteDoc(id) {
    if (confirm('Are you sure you want to delete this record? This action cannot be undone.')) {
        db.collection("payments").doc(id).delete()
            .then(() => {
                console.log("Document deleted");
                // No need to update totals here - onSnapshot will handle it
            })
            .catch(err => alert("Error: " + err));
    }
}

// ========== WALLET MODAL FUNCTIONS ==========
const walletModal = document.getElementById('walletModal');
const closeModalBtn = document.getElementById('closeModalBtn');
const walletCardsContainer = document.getElementById('walletCardsContainer');

// Close modal
closeModalBtn.addEventListener('click', function() {
    walletModal.style.display = 'none';
});

// Close with ESC
document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape' && walletModal.style.display === 'block') {
        walletModal.style.display = 'none';
    }
});

// Format date function
function formatWalletDate(timestamp) {
    if (!timestamp) return 'No date';
    
    let date;
    if (timestamp.toDate) {
        date = timestamp.toDate();
    } else {
        date = new Date(timestamp);
    }
    
    // Format: MM/DD/YYYY, HH:MM AM/PM
    return date.toLocaleString('en-US', { 
        month: '2-digit', 
        day: '2-digit', 
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        hour12: true
    }).replace(',', '');
}

// Load and display the LATEST wallet snapshot only
async function loadLatestWalletSnapshot() {
    try {
        // Get ONLY the most recent snapshot
        const snapshot = await db.collection("wallet_snapshots")
            .orderBy("timestamp", "desc")
            .limit(1)
            .get();
        
        if (snapshot.empty) {
            walletCardsContainer.innerHTML = `
                <div class="no-data-modal">
                    <span class="no-data-icon">📭</span>
                    No wallet transfers yet<br>
                    <small style="opacity:0.8">Click "Send Wallet" to create your first transfer</small>
                </div>
            `;
            return;
        }
        
        // Get the latest snapshot data
        const data = snapshot.docs[0].data();
        const totals = data.totals || {};
        const timestamp = data.timestamp;
        const formattedDate = formatWalletDate(timestamp);
        
        // Define members
        const members = [
            { key: 'anas', label: 'Anas', headerClass: 'header-anas' },
            { key: 'oussama', label: 'Oussama', headerClass: 'header-oussama' },
            { key: 'amine', label: 'Amine', headerClass: 'header-amine' },
            { key: 'houssam', label: 'Houssam', headerClass: 'header-houssam' },
            { key: 'zaki', label: 'Zaki', headerClass: 'header-zaki' },
            { key: 'mohamed', label: 'Mohamed', headerClass: 'header-mohamed' }
        ];
        
        // Build horizontal cards
        let cardsHTML = '';
        let hasAnyAmount = false;
        
        members.forEach(member => {
            const amount = totals[member.key] || 0;
            if (amount > 0) {
                hasAnyAmount = true;
                cardsHTML += `
                    <div class="small-wallet-card">
                        <div class="card-header ${member.headerClass}">${member.label}</div>
                        <div class="card-amount">${amount.toFixed(2)} MAD</div>
                        <div class="card-date">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8zm.5-13H11v6l5.2 3.1.8-1.2-4.5-2.7V7z"/>
                            </svg>
                            ${formattedDate}
                        </div>
                    </div>
                `;
            }
        });
        
        // If no amounts at all (all zero), show message
        if (!hasAnyAmount) {
            cardsHTML = `
                <div class="no-data-modal">
                    <span class="no-data-icon">📭</span>
                    All amounts are zero in the latest transfer
                </div>
            `;
        }
        
        walletCardsContainer.innerHTML = cardsHTML;
        
    } catch (error) {
        console.error("Error loading wallet snapshot: ", error);
        walletCardsContainer.innerHTML = `
            <div class="no-data-modal">
                <span class="no-data-icon">❌</span>
                Error loading wallet data<br>
                <small>${error.message}</small>
            </div>
        `;
    }
}

// ========== SEND WALLET - CORRECTED VERSION ==========
const sendBtn = document.getElementById('sendWalletBtn');
const viewBtn = document.getElementById('viewWalletBtn');

sendBtn.addEventListener('click', async function() {
    // Save current totals to Firebase
    const totalsToSave = { ...currentTotals };
    
    // Don't save if all totals are zero (optional)
    const hasNonZero = Object.values(totalsToSave).some(val => val > 0);
    if (!hasNonZero) {
        alert('No amounts to send. All totals are zero.');
        return;
    }
    
    const walletData = {
        totals: totalsToSave,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        createdAt: new Date().toISOString()
    };
    
    try {
        sendBtn.innerHTML = `<span>⏳</span> Sending...`;
        sendBtn.disabled = true;
        
        // Save to Firebase
        await db.collection("wallet_snapshots").add(walletData);
        
        // Show success
        sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/><circle cx="18" cy="16" r="2" fill="white" opacity="0.3"/></svg> Sent ✓`;
        
        // IMPORTANT: Delete all payment records to clear totals
        // This is the key step to make totals go to zero
        const paymentsSnapshot = await db.collection("payments").get();
        const batch = db.batch();
        paymentsSnapshot.docs.forEach(doc => {
            batch.delete(doc.ref);
        });
        await batch.commit();
        
        // Reset button after 2 seconds
        setTimeout(() => {
            sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/><circle cx="18" cy="16" r="2" fill="white" opacity="0.3"/></svg> Send Wallet`;
            sendBtn.disabled = false;
        }, 2000);
        
    } catch (error) {
        console.error("Error saving wallet snapshot: ", error);
        alert("Failed to save wallet. Check connection.");
        sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm2-4h12v2H6V2zm16 7H2v12h20V9zm-4 7h-4v-2h4v2z"/><circle cx="18" cy="16" r="2" fill="white" opacity="0.3"/></svg> Send Wallet`;
        sendBtn.disabled = false;
    }
});

// View wallet - Open modal and load LATEST snapshot only
viewBtn.addEventListener('click', async function() {
    try {
        viewBtn.innerHTML = `<span>⏳</span> Loading...`;
        viewBtn.disabled = true;
        
        await loadLatestWalletSnapshot();
        walletModal.style.display = 'block';
        
        setTimeout(() => {
            viewBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/><circle cx="12" cy="12" r="2.5" fill="white" opacity="0.5"/></svg> View Wallet`;
            viewBtn.disabled = false;

        viewBtn.disabled = false;
    }
});
